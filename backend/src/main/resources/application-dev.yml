# Development Profile Configuration
# This configuration is used when running with --spring.profiles.active=dev

spring:
  # Development Database Configuration
  datasource:
    url: jdbc:h2:file:./data/librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    # Using file-based H2 database for development persistence
    
  # H2 Console Configuration (enabled for development)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true  # Allow remote connections in dev
        trace: true
  
  # JPA Configuration for Development
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        
  # Flyway Development Configuration
  flyway:
    clean-disabled: false  # Allow clean in development
    
# Enhanced Logging for Development
logging:
  level:
    com.example.library: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
    root: INFO
  file:
    name: logs/library-dev.log
    
# Development-specific management endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all endpoints in development
  endpoint:
    health:
      show-details: always